apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sentiment-api
  namespace: ml-serving
spec:
  ingressClassName: traefik
  rules:
    - host: sentiment.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: sentiment-api
                port:
                  number: 80
