apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sentiment-api
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/R055LE/mlops-pipeline-lab.git
    targetRevision: main
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: ml-serving
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
